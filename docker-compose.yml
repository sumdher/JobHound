# JobHound - docker-compose.yml
# Docker Compose configuration for local development.
# Run via: make dev  (wraps with `infisical run` to inject secrets)

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobhound_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobhound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-jobhound}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhound} -d ${POSTGRES_DB:-jobhound}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: jobhound_backend
    env_file:
      - ./backend/.env          # non-secret config only
    environment:
      # DATABASE_URL built from root-level Infisical secrets — never hardcoded
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhound}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-jobhound}
      # Secrets — injected by `infisical run` via Makefile
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: jobhound_frontend
    environment:
      # NEXT_PUBLIC_API_URL intentionally omitted — falls back to "/backend"
      # which is proxied by Next.js rewrites to http://backend:8000.
      INTERNAL_API_URL: http://backend:8000
      # NEXTAUTH_URL is intentionally not set for dev.
      # NextAuth v4 auto-detects the base URL from the request Host header.
      # Secrets — injected by `infisical run` via Makefile
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: Cloudflare Tunnel for stable public HTTPS access.
  # Enable: add CLOUDFLARE_TUNNEL_TOKEN to Infisical and run: make dev
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-disabled}
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  postgres_data:
